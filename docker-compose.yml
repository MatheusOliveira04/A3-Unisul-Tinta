version: '3.8'

services:

  activemq:
    image: rmohr/activemq
    container_name: activemq

    ports:
      - "61616:61616"
      - "8161:8161"

  mysql:
    image: mysql:8.4
    container_name: mysql-tinta
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tinta
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  auth-api:
    build: ./tinta-auth
    container_name: auth-api

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tinta?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin

      SPRING_ACTIVEMQ_BROKER_URL: tcp://activemq:61616

    depends_on:
      - mysql
      - activemq

    ports:
      - "8080:8080"

  historico-api:
    build: ./tinta-core
    container_name: historico-api

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tinta?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin

      SPRING_ACTIVEMQ_BROKER_URL: tcp://activemq:61616

    depends_on:
      - mysql
      - activemq

    ports:
      - "8081:8081"

volumes:
  mysql_data: