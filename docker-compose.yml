version: '3.8'

services:

  activemq:
    image: rmohr/activemq
    container_name: activemq

    ports:
      - "61616:61616"
      - "8161:8161"

  mysql:
    image: mysql:8.4
    container_name: mysql-tinta
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tinta
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: