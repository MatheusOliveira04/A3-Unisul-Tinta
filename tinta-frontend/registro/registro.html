<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registre-se - As cores da sua vida estão aqui</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>
    <div class="sidebar">
        <div class="profile-section">
            <div class="profile-pic">👤</div>
            <p class="user-name">Visitante</p>
        </div>
        <a href="../index.html">Início</a>
        <a href="../login/login.html" class="btn-guia">Login</a>
        <a href="../registro/registro.html" class="btn-guia">Registre-se</a>
        <a href="../guia/guia.html" class="btn-guia">Guia prático de pintura</a>
    </div>
    <div class="main-wrapper">
        <div class="header">
            <img src="imagem 0004.jpg" alt="Banner Registro" class="banner-img">
        </div>
        <div class="content">
            <h1 class="main-title">Crie sua Conta</h1>
            <div class="container">
                <form id="registroForm" onsubmit="event.preventDefault(); alert('Cadastro realizado com sucesso (Simulação)!');">
                    <div class="form-group">
                        <label for="nome">Nome Completo:</label>
                        <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" placeholder="Digite seu melhor e-mail" required>
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" placeholder="Crie uma senha segura" required>
                    </div>
                    <button type="submit" class="btn-gerar">Cadastrar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
